<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Controle de Retrabalho – Alliage</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh}
.color-bar{display:flex;height:6px}
.color-bar div{flex:1}
.header-inner{display:flex;justify-content:space-between;align-items:center;padding:16px 24px 18px;background:#fff;box-shadow:0 2px 8px rgba(22,40,68,.08)}
.brand{font-size:10px;letter-spacing:4px;color:#2E5FA3;font-weight:700;margin-bottom:2px}
.htitle{font-size:17px;font-weight:700;color:#162844;letter-spacing:.5px}
.hdate{font-size:11px;color:#94a3b8;margin-top:3px;text-transform:capitalize}
.badges{display:flex;align-items:center;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0;padding:8px 16px;gap:8px}
.badge-box{display:flex;flex-direction:column;align-items:center}
.badge-num{font-size:22px;font-weight:700;color:#2E5FA3;line-height:1}
.badge-num.teal{color:#1a9e8f}
.badge-lbl{font-size:10px;color:#94a3b8;margin-top:2px}
.badge-sep{width:1px;background:#e2e8f0;margin:0 4px;height:32px}
nav{display:flex;background:#fff;border-bottom:1px solid #e2e8f0}
nav button{flex:1;padding:13px 4px;background:none;border:none;color:#94a3b8;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;border-bottom:3px solid transparent}
nav button.active{color:#2E5FA3;border-bottom:3px solid #2E5FA3;background:#eef3fb;font-weight:700}
.card{margin:20px 16px;background:#fff;border-radius:10px;padding:0 20px 24px;box-shadow:0 1px 6px rgba(22,40,68,.07);border:1px solid #e2e8f0;overflow:hidden}
.section-bar{height:4px;background:linear-gradient(90deg,#162844,#2E5FA3,#2a85c7,#1a9e8f,#1aab78);margin:0 -20px 20px}
.card-title{font-size:11px;letter-spacing:2px;color:#2E5FA3;font-weight:700;margin-bottom:18px;text-transform:uppercase}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-wrap{margin-bottom:14px;position:relative}
label{display:block;font-size:10.5px;color:#475569;font-weight:600;letter-spacing:.5px;margin-bottom:5px}
.req{color:#2E5FA3}
input,select{width:100%;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:6px;padding:9px 12px;color:#1e293b;font-size:13px;font-family:inherit;outline:none}
input:focus,select:focus{border-color:#2E5FA3}
input.err,select.err{border-color:#ef4444;background:#fff5f5}
.desc-preview{font-size:11px;color:#2E5FA3;margin-top:4px;min-height:16px;font-style:italic}
/* Autocomplete dropdown */
.ac-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid #2E5FA3;border-top:none;border-radius:0 0 6px 6px;max-height:180px;overflow-y:auto;z-index:100;display:none}
.ac-item{padding:8px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid #f1f5f9}
.ac-item:hover{background:#eef3fb}
.ac-code{font-weight:700;color:#162844}
.ac-name{color:#64748b;font-size:11px}
.btn-row{display:flex;gap:10px;margin-top:8px;justify-content:flex-end}
.btn-primary{background:#2E5FA3;color:#fff;border:none;border-radius:7px;padding:10px 24px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}
.btn-primary:hover{background:#1e4a8a}
.btn-cancel{background:none;color:#475569;border:1.5px solid #e2e8f0;border-radius:7px;padding:10px 18px;font-size:13px;cursor:pointer;font-family:inherit}
.empty{color:#94a3b8;font-size:13px;text-align:center;padding:32px 0}
.item-card{display:flex;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:10px;overflow:hidden}
.item-bar{width:4px;flex-shrink:0;background:linear-gradient(180deg,#2E5FA3,#1a9e8f)}
.item-body{flex:1}
.item-header{display:flex;align-items:center;gap:8px;padding:10px 12px 2px;flex-wrap:wrap}
.item-idx{font-size:10px;color:#94a3b8}
.item-code{font-weight:700;color:#162844;font-size:13px}
.item-name{font-size:11px;color:#64748b;width:100%;padding:0 12px 4px}
.item-qty{background:#fff;border:1px solid #e2e8f0;border-radius:4px;padding:2px 8px;font-size:11px;color:#475569;font-weight:600}
.item-meta{display:flex;gap:6px;flex-wrap:wrap;padding:0 12px 6px}
.chip{font-size:10.5px;padding:3px 9px;border-radius:4px;font-weight:600}
.chip-blue{background:#dbeafe;color:#2E5FA3}
.chip-teal{background:#ccfbf1;color:#0f766e}
.chip-gray{background:#f1f5f9;color:#475569}
.item-obs{font-size:11px;color:#94a3b8;padding:0 12px 6px;font-style:italic}
.item-actions{display:flex;gap:8px;padding:0 12px 10px}
.btn-sm{background:#fff;border:1px solid #e2e8f0;color:#475569;border-radius:5px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit}
.btn-sm-danger{border-color:#fecaca;color:#dc2626}
pre{background:#f8fafc;border:1px solid #e2e8f0;border-radius:7px;padding:16px;font-size:11.5px;color:#475569;white-space:pre-wrap;margin-bottom:16px;line-height:1.8;font-family:'Courier New',monospace}
.toast{position:fixed;top:16px;right:16px;z-index:999;padding:10px 18px;border-radius:8px;font-size:12px;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.15);display:none}
.tab{display:none}
.tab.active{display:block}
/* CHARTS */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-box{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:16px}
.chart-title{font-size:10px;font-weight:700;color:#2E5FA3;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.chart-full{grid-column:1/-1}
.filter-row{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.filter-row label{margin:0;font-size:11px}
.filter-row select,.filter-row input{width:auto;font-size:12px;padding:6px 10px}
@media(max-width:600px){.row2{grid-template-columns:1fr}.charts-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="color-bar">
  <div style="background:#162844"></div><div style="background:#2E5FA3"></div>
  <div style="background:#2a85c7"></div><div style="background:#1a9e8f"></div>
  <div style="background:#1aab78"></div>
</div>
<div class="header-inner">
  <div>
    <div class="brand">ALLIAGE</div>
    <div class="htitle">CONTROLE DE RETRABALHO</div>
    <div class="hdate" id="today-label"></div>
  </div>
  <div class="badges">
    <div class="badge-box"><span class="badge-num" id="badge-itens">0</span><span class="badge-lbl">itens hoje</span></div>
    <div class="badge-sep"></div>
    <div class="badge-box"><span class="badge-num teal" id="badge-pcs">0</span><span class="badge-lbl">peças hoje</span></div>
  </div>
</div>

<nav>
  <button class="active" onclick="showTab('form')">➕ Registrar</button>
  <button onclick="showTab('lista')">📋 Lista (<span id="nav-count">0</span>)</button>
  <button onclick="showTab('graficos')">📊 Gráficos</button>
  <button onclick="showTab('email')">✉️ E-mail</button>
</nav>

<!-- FORM -->
<div id="tab-form" class="tab active">
  <div class="card">
    <div class="section-bar"></div>
    <div class="card-title" id="form-title">Novo registro</div>
    <input type="hidden" id="edit-id"/>
    <div class="row2">
      <div class="field-wrap">
        <label>Código / PN <span class="req">*</span></label>
        <input type="text" id="f-codigo" placeholder="Digite o código" autocomplete="off" oninput="onCodigoInput()" onblur="hideAc()"/>
        <div class="ac-list" id="ac-list"></div>
        <div class="desc-preview" id="desc-preview"></div>
      </div>
      <div class="field-wrap">
        <label>Quantidade (pcs) <span class="req">*</span></label>
        <input type="number" id="f-quantidade" min="1" placeholder="Qtd"/>
      </div>
    </div>
    <div class="row2">
      <div class="field-wrap">
        <label>Setor de origem <span class="req">*</span></label>
        <select id="f-setor">
          <option value="">Selecione…</option>
          <option>Estamparia</option><option>Solda Elétrica</option>
          <option>Galvanoplastia</option><option>Pintura</option>
          <option>Corte a Laser</option><option>Usinagem</option>
          <option>Micro Usinagem</option><option>Montagem</option><option>Outro</option>
        </select>
      </div>
      <div class="field-wrap">
        <label>Tipo de defeito <span class="req">*</span></label>
        <select id="f-defeito" onchange="toggleDefeito()">
          <option value="">Selecione…</option>
          <option>Batida / Amassado</option><option>Sujeira</option>
          <option>Problema de matéria prima</option><option>Microagulhamento</option>
          <option>Falha operacional</option><option>Falha de solda</option>
          <option>Risco / Arranhão</option><option>Oxidação</option>
          <option>Rebarbas</option><option>Dimensão fora</option>
          <option>Furação errada</option><option>Acabamento inadequado</option><option>Outro</option>
        </select>
      </div>
    </div>
    <div class="field-wrap" id="defeito-custom-wrap" style="display:none">
      <label>Especificar defeito</label>
      <input type="text" id="f-defeito-custom" placeholder="Descreva o defeito"/>
    </div>
    <div class="row2">
      <div class="field-wrap">
        <label>Resp. por avaliar retrabalho <span class="req">*</span></label>
        <select id="f-responsavel" onchange="toggleResp()">
          <option value="">Selecione…</option>
          <option>Klever Barboza</option><option>Carlos Servante</option>
          <option>Giuliano Pasti</option><option>Carlos (Inspetor Qualidade)</option><option>Outro</option>
        </select>
      </div>
      <div></div>
    </div>
    <div class="field-wrap" id="resp-custom-wrap" style="display:none">
      <label>Nome do responsável</label>
      <input type="text" id="f-resp-custom" placeholder="Nome"/>
    </div>
    <div class="field-wrap">
      <label>Observação (opcional)</label>
      <input type="text" id="f-obs" placeholder="Opcional"/>
    </div>
    <div class="btn-row">
      <button class="btn-cancel" id="btn-cancel" style="display:none" onclick="cancelEdit()">Cancelar</button>
      <button class="btn-primary" onclick="submitItem()">Adicionar item</button>
    </div>
  </div>
</div>

<!-- LISTA -->
<div id="tab-lista" class="tab">
  <div class="card">
    <div class="section-bar"></div>
    <div class="card-title">Registros do dia</div>
    <div id="lista-container"><div class="empty">Carregando…</div></div>
  </div>
</div>

<!-- GRÁFICOS -->
<div id="tab-graficos" class="tab">
  <div class="card">
    <div class="section-bar"></div>
    <div class="card-title">Painel de análise</div>
    <div class="filter-row">
      <label>Período:</label>
      <select id="graf-periodo" onchange="renderCharts()">
        <option value="hoje">Hoje</option>
        <option value="semana">Últimos 7 dias</option>
        <option value="mes">Últimos 30 dias</option>
      </select>
    </div>
    <div class="charts-grid">
      <div class="chart-box">
        <div class="chart-title">Defeitos por tipo</div>
        <canvas id="chart-defeitos"></canvas>
      </div>
      <div class="chart-box">
        <div class="chart-title">Retrabalho por setor</div>
        <canvas id="chart-setores"></canvas>
      </div>
      <div class="chart-box chart-full">
        <div class="chart-title">Evolução diária (peças)</div>
        <canvas id="chart-evolucao"></canvas>
      </div>
    </div>
  </div>
</div>

<!-- EMAIL -->
<div id="tab-email" class="tab">
  <div class="card">
    <div class="section-bar"></div>
    <div class="card-title">Prévia do e-mail</div>
    <div id="email-empty" class="empty" style="display:none">Nenhum item para gerar e-mail.</div>
    <pre id="email-pre" style="display:none"></pre>
    <button class="btn-primary" id="btn-copy" style="display:none" onclick="copyEmail()">📋 Copiar e-mail</button>
  </div>
</div>

<div class="toast" id="toast"></div>

const todayISO = () => new Date().toISOString().slice(0,10);
const daysAgo  = n => { const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); };

window.showTab = name => {
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  const idx = ["form","lista","graficos","email"].indexOf(name);
  document.querySelectorAll("nav button")[idx].classList.add("active");
  if(name==="graficos") renderCharts();
  if(name==="email") renderEmail();
};

// ── AUTOCOMPLETE ──────────────────────────────────────────
let acTimeout;
window.onCodigoInput = () => {
  clearTimeout(acTimeout);
  acTimeout = setTimeout(()=>{
    const val = document.getElementById("f-codigo").value.trim().toUpperCase();
    const list = document.getElementById("ac-list");
    const prev = document.getElementById("desc-preview");
    if(!val){ list.style.display="none"; prev.textContent=""; return; }
    // Exact match
    if(PECAS[val]||PECAS[document.getElementById("f-codigo").value.trim()]){
      const nome = PECAS[val]||PECAS[document.getElementById("f-codigo").value.trim()];
      prev.textContent = nome;
      list.style.display="none"; return;
    }
    prev.textContent="";
    // Partial match
    const matches = Object.entries(PECAS).filter(([k])=>k.toUpperCase().includes(val)).slice(0,8);
    if(!matches.length){ list.style.display="none"; return; }
    list.innerHTML = matches.map(([k,v])=>
      `<div class="ac-item" onmousedown="selectAc('${k}')">
        <div class="ac-code">${k}</div>
        <div class="ac-name">${v.substring(0,60)}${v.length>60?"…":""}</div>
      </div>`).join("");
    list.style.display="block";
  },150);
};
window.selectAc = code => {
  document.getElementById("f-codigo").value = code;
  document.getElementById("desc-preview").textContent = PECAS[code]||"";
  document.getElementById("ac-list").style.display="none";
};
window.hideAc = () => setTimeout(()=>{ document.getElementById("ac-list").style.display="none"; },200);

window.toggleDefeito = () => {
  document.getElementById("defeito-custom-wrap").style.display =
    document.getElementById("f-defeito").value==="Outro"?"block":"none";
};
window.toggleResp = () => {
  document.getElementById("resp-custom-wrap").style.display =
    document.getElementById("f-responsavel").value==="Outro"?"block":"none";
};

window.showToast = (msg,type="ok") => {
  const t=document.getElementById("toast");
  t.textContent=msg; t.style.background=type==="warn"?"#1a9e8f":"#1aab78";
  t.style.display="block"; setTimeout(()=>t.style.display="none",2500);
};

// ── CHARTS ────────────────────────────────────────────────
let chartDefeitos, chartSetores, chartEvolucao;
const PALETTE = ["#2E5FA3","#1a9e8f","#2a85c7","#1aab78","#162844","#64b5f6","#80cbc4","#a5d6a7","#90caf9","#4db6ac","#81d4fa","#b2dfdb"];

window.renderCharts = () => {
  const periodo = document.getElementById("graf-periodo").value;
  let desde;
  if(periodo==="hoje") desde=todayISO();
  else if(periodo==="semana") desde=daysAgo(7);
  else desde=daysAgo(30);

  const filtered = allItems.filter(i=>i.data>=desde);

  // Defeitos
  const defMap={};
  filtered.forEach(i=>{ defMap[i.defeitoLabel]=(defMap[i.defeitoLabel]||0)+Number(i.quantidade); });
  const defLabels=Object.keys(defMap), defVals=Object.values(defMap);

  if(chartDefeitos) chartDefeitos.destroy();
  chartDefeitos = new Chart(document.getElementById("chart-defeitos"),{
    type:"bar", data:{labels:defLabels,datasets:[{data:defVals,backgroundColor:PALETTE,borderRadius:5}]},
    options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}},indexAxis:"x",responsive:true}
  });

  // Setores
  const setMap={};
  filtered.forEach(i=>{ setMap[i.setor]=(setMap[i.setor]||0)+Number(i.quantidade); });
  const setLabels=Object.keys(setMap), setVals=Object.values(setMap);

  if(chartSetores) chartSetores.destroy();
  chartSetores = new Chart(document.getElementById("chart-setores"),{
    type:"bar", data:{labels:setLabels,datasets:[{data:setVals,backgroundColor:PALETTE,borderRadius:5}]},
    options:{plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{stepSize:1}}},indexAxis:"y",responsive:true}
  });

  // Evolução diária
  const diasMap={};
  filtered.forEach(i=>{ diasMap[i.data]=(diasMap[i.data]||0)+Number(i.quantidade); });
  const diasLabels=Object.keys(diasMap).sort(), diasVals=diasLabels.map(d=>diasMap[d]);

  if(chartEvolucao) chartEvolucao.destroy();
  chartEvolucao = new Chart(document.getElementById("chart-evolucao"),{
    type:"line",
    data:{labels:diasLabels,datasets:[{data:diasVals,borderColor:"#2E5FA3",backgroundColor:"rgba(46,95,163,0.1)",tension:0.3,fill:true,pointBackgroundColor:"#2E5FA3",pointRadius:5}]},
    options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}},responsive:true}
  });
};

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, Timestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyD2GnRgvIF4ueOzkDpeJJURlwHrQOLTn2c",
  authDomain:"alliage-retrabalho.firebaseapp.com",
  projectId:"alliage-retrabalho",
  storageBucket:"alliage-retrabalho.firebasestorage.app",
  messagingSenderId:"858452083224",
  appId:"1:858452083224:web:7fc76f209abb4018a0f96d"
});
const db = getFirestore(app);
const colRef = collection(db,"retrabalho");

window.allItems = [];

onSnapshot(query(colRef,orderBy("createdAt","asc")), snap=>{
  window.allItems=[];
  snap.forEach(d=>window.allItems.push({id:d.id,...d.data()}));
  const today = new Date().toISOString().slice(0,10);
  const todayItems = window.allItems.filter(i=>i.data===today);
  renderLista(todayItems);
  renderBadges(todayItems);
  renderEmail(todayItems);
});

function renderBadges(items){
  const total=items.reduce((s,i)=>s+Number(i.quantidade),0);
  document.getElementById("badge-itens").textContent=items.length;
  document.getElementById("badge-pcs").textContent=total;
  document.getElementById("nav-count").textContent=items.length;
}

function renderLista(items){
  const c=document.getElementById("lista-container");
  if(!items.length){ c.innerHTML='<div class="empty">Nenhum item registrado hoje.</div>'; return; }
  c.innerHTML=items.map((item,idx)=>`
    <div class="item-card">
      <div class="item-bar"></div>
      <div class="item-body">
        <div class="item-header">
          <span class="item-idx">#${idx+1}</span>
          <span class="item-code">${item.codigo}</span>
          <span class="item-qty">${item.quantidade} pc(s)</span>
        </div>
        ${item.nomeExibicao?`<div class="item-name">${item.nomeExibicao}</div>`:""}
        <div class="item-meta">
          <span class="chip chip-blue">${item.setor}</span>
          <span class="chip chip-teal">${item.defeitoLabel}</span>
          <span class="chip chip-gray">${item.responsavelLabel}</span>
        </div>
        ${item.obs?`<div class="item-obs">Obs: ${item.obs}</div>`:""}
        <div class="item-actions">
          <button class="btn-sm" onclick="startEdit('${item.id}')">✏️ Editar</button>
          <button class="btn-sm btn-sm-danger" onclick="deleteItem('${item.id}')">🗑 Remover</button>
        </div>
      </div>
    </div>`).join("");
}

function renderEmail(items){
  if(!items) items=window.allItems.filter(i=>i.data===new Date().toISOString().slice(0,10));
  const pre=document.getElementById("email-pre");
  const empty=document.getElementById("email-empty");
  const btn=document.getElementById("btn-copy");
  if(!items.length){ pre.style.display="none"; btn.style.display="none"; empty.style.display="block"; return; }
  empty.style.display="none"; pre.style.display="block"; btn.style.display="inline-block";
  const today=new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"2-digit",year:"numeric"});
  const total=items.reduce((s,i)=>s+Number(i.quantidade),0);
  const rows=items.map((i,idx)=>`${idx+1}. [${i.codigo}]${i.nomeExibicao?" – "+i.nomeExibicao:""}\n   Setor: ${i.setor} | Defeito: ${i.defeitoLabel} | Qtd: ${i.quantidade} pc(s) | Resp.: ${i.responsavelLabel}${i.obs?"\n   Obs: "+i.obs:""}`).join("\n\n");
  pre.textContent=`Assunto: [RETRABALHO] Controle Diário – ${new Date().toISOString().slice(0,10)}\n\n------------------------------------------------------\nRELATÓRIO DE RETRABALHO – ${today.toUpperCase()}\n------------------------------------------------------\n\nTotal de itens: ${items.length}\nTotal de peças: ${total}\n\nDETALHAMENTO:\n\n${rows}\n\n------------------------------------------------------\nGerado via Controle de Retrabalho – Alliage`;
}

window.copyEmail=()=>{
  navigator.clipboard.writeText(document.getElementById("email-pre").textContent).then(()=>{
    const b=document.getElementById("btn-copy");
    b.textContent="✅ Copiado!"; setTimeout(()=>b.textContent="📋 Copiar e-mail",2000);
  });
};

window.submitItem = async()=>{
  const codigo=document.getElementById("f-codigo").value.trim();

  const setor=document.getElementById("f-setor").value;
  const defeito=document.getElementById("f-defeito").value;
  const defeitoCustom=document.getElementById("f-defeito-custom").value.trim();
  const responsavel=document.getElementById("f-responsavel").value;
  const respCustom=document.getElementById("f-resp-custom").value.trim();
  const obs=document.getElementById("f-obs").value.trim();
  const editId=document.getElementById("edit-id").value;

  let ok=true;
  [["f-codigo",codigo],["f-quantidade",quantidade],["f-setor",setor],["f-defeito",defeito],["f-responsavel",responsavel]].forEach(([id,val])=>{
    const el=document.getElementById(id);
    if(!val){el.classList.add("err");ok=false;}else el.classList.remove("err");
  });
  if(!ok) return;

  const nomeExibicao = PECAS[codigo] || "";
  const payload={
    codigo, nomeExibicao, quantidade:Number(quantidade), setor,
    defeito, defeitoLabel:defeito==="Outro"?(defeitoCustom||"Outro"):defeito,
    responsavel, responsavelLabel:responsavel==="Outro"?(respCustom||"Outro"):responsavel,
    obs, data:new Date().toISOString().slice(0,10), createdAt:Timestamp.now()
  };

  if(editId){
    await updateDoc(doc(db,"retrabalho",editId),payload);
    showToast("Item atualizado.");
    cancelEdit();
  } else {
    await addDoc(colRef,payload);
    showToast("Item adicionado.");
    clearForm();
  }
};

window.deleteItem=async id=>{
  if(!confirm("Remover este item?")) return;
  await deleteDoc(doc(db,"retrabalho",id));
  showToast("Item removido.","warn");
};

window.startEdit=id=>{
  const item=window.allItems.find(i=>i.id===id); if(!item) return;
  document.getElementById("f-codigo").value=item.codigo;
  document.getElementById("desc-preview").textContent=item.nomeExibicao||"";
  document.getElementById("f-quantidade").value=item.quantidade;
  document.getElementById("f-setor").value=item.setor;
  document.getElementById("f-defeito").value=item.defeito;
  document.getElementById("f-defeito-custom").value=item.defeito==="Outro"?item.defeitoLabel:"";
  document.getElementById("f-responsavel").value=item.responsavel;
  document.getElementById("f-resp-custom").value=item.responsavel==="Outro"?item.responsavelLabel:"";
  document.getElementById("f-obs").value=item.obs||"";
  document.getElementById("edit-id").value=id;
  document.getElementById("form-title").textContent="✏️ Editar item";
  document.getElementById("btn-cancel").style.display="inline-block";
  showTab("form"); window.scrollTo(0,0);
  toggleDefeito(); toggleResp();
};

window.cancelEdit=()=>{
  clearForm();
  document.getElementById("edit-id").value="";
  document.getElementById("form-title").textContent="Novo registro";
  document.getElementById("btn-cancel").style.display="none";
};

function clearForm(){
  ["f-codigo","f-quantidade","f-obs","f-defeito-custom","f-resp-custom"].forEach(id=>document.getElementById(id).value="");
  ["f-setor","f-defeito","f-responsavel"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("desc-preview").textContent="";
  document.getElementById("defeito-custom-wrap").style.display="none";
  document.getElementById("resp-custom-wrap").style.display="none";
}
</script>
</body>
</html>
